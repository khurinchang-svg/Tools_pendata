<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Kode Profesi</title>
    <style>
        :root {
            --primary: #006e16;
            --primary-hover: #00881c;
            --primary-alpha: rgba(0, 110, 22, 0.12);
            --bg: #f5f7f6;
            --card: #ffffff;
            --text: #222;
            --text-light: #666;
            --border: #e2e8e4;
            --radius: 18px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            align-self: flex-start;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
        }

        h1 {
            text-align: center;
            color: var(--text);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-alpha);
        }

        .btn-cari {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-cari:hover { background: var(--primary-hover); }
        .btn-cari:active { transform: scale(0.98); }
        .btn-cari:disabled { background: #aaa; cursor: not-allowed; }

        .hasil-box {
            margin-top: 20px;
            background: #e8f5e9;
            border: 2px solid #a5d6a7;
            border-radius: 14px;
            padding: 16px;
            display: none;
        }

        .hasil-box.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hasil-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .hasil-profesi {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .hasil-kode {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }

        .error-box {
            background: #fff5f5;
            border-color: #fcc;
        }

        .error-box .hasil-profesi {
            color: #c62828;
            font-size: 15px;
            font-weight: 600;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
        }

        .back-link:hover { color: var(--primary); }

        .petunjuk {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 12px;
            font-size: 13px;
            color: #e65100;
            display: none;
        }

        .petunjuk.show { display: block; }
    </style>
</head>
<body>

            <h1>Pencarian Kode Profesi</h1>
            <p class="subtitle">Ketik nama pekerjaan untuk mendapatkan kode profesi yang sesuai</p>

            <div class="form-group">

            </div>

            <button class="btn-cari" id="btnCari" onclick="cariProfesi()">Cari Profesi</button>

            <div class="hasil-box" id="hasilBox">

        async function cariProfesi() {
    const keyword = document.getElementById('inputProfesi').value.trim();
    const btn = document.getElementById('btnCari');
    const hasilBox = document.getElementById('hasilBox');
    const hasilLabel = document.getElementById('hasilLabel');
    const hasilProfesi = document.getElementById('hasilProfesi');
    const hasilKode = document.getElementById('hasilKode');
    const petunjukSaran = document.getElementById('petunjukSaran');

    if (!keyword) return;

    btn.disabled = true;
    btn.textContent = 'Mencari...';
    hasilBox.classList.remove('show', 'error-box');
    petunjukSaran.classList.remove('show');

    try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{
            role: 'user',
            content: `You are a job classification assistant. Here is the COMPLETE list of available job codes:\n${DAFTAR_PROFESI}\n\nUser typed: "${keyword}"\n\nIMPORTANT RULES:\n1. Choose ONE best match from the list above.\n2. DO NOT invent or make up any job that is NOT in the list.\n3. If no match, return exactly: "185 - Lainnya (tuliskan: ....................................)" followed by "(saran: your suggestion)".\n4. Reply ONLY with this format: "CODE - JOB NAME"\n5. No extra words, no explanation.`
        }]
    })
});

const data = await response.json();
const jawaban = data.choices[0].message.content.trim();

        if (jawaban.includes('185') && jawaban.includes('saran:')) {
            const parts = jawaban.split('(saran:');
            hasilProfesi.textContent = parts[0].trim();
            hasilKode.textContent = '';
            petunjukSaran.textContent = 'Saran: ' + parts[1].replace(')', '').trim();
            petunjukSaran.classList.add('show');
        } else {
            hasilProfesi.textContent = jawaban;
            hasilKode.textContent = 'Pencocokan AI';
        }

        hasilLabel.textContent = 'Hasil Pencarian';
        hasilBox.classList.add('show');

    } catch (err) {
        hasilLabel.textContent = 'Error';
        hasilProfesi.textContent = 'Gagal menghubungi AI';
        hasilKode.textContent = 'Periksa koneksi internet';
        hasilBox.classList.add('error-box', 'show');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Cari Profesi';
    }
};
