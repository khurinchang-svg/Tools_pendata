<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Cari Kode Profesi & KBLI</title>
    <script src="https://cdn.jsdelivr.net/npm/minisearch@7.1.1/dist/umd/index.min.js">
    </script>
    <style>
        :root {
            --primary: #006e16;
            --primary-hover: #00881c;
            --primary-alpha: rgba(0, 110, 22, 0.12);
            --secondary: #0066cc;
            --secondary-hover: #0052a3;
            --bg: #f5f7f6;
            --card: #ffffff;
            --text: #222;
            --text-light: #666;
            --border: #e2e8e4;
            --radius: 18px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: 0.25s ease;
            --danger: #c62828;
            --warning: #e65100;
            --success: #155724;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 640px;
            align-self: flex-start;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
        }

        h1 {
            text-align: center;
            color: var(--text);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .badge-ai {
            font-size: 10px;
            background: #7b1fa2;
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
            margin-left: 8px;
        }

        .divider {
            border: none;
            border-top: 2px solid var(--border);
            margin: 24px 0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-alpha);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
        }

        .btn-cari {
            padding: 14px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-cari:hover:not(:disabled) {
            background: var(--primary-hover);
        }
        .btn-cari:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-cari:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .token-status {
            font-size: 13px;
            margin-top: 6px;
            min-height: 20px;
        }
        .token-status.success {
            color: var(--success);
        }
        .token-status.error {
            color: var(--danger);
        }
        .token-status.info {
            color: var(--warning);
        }

        .hasil-box {
            margin-top: 16px;
            border-radius: 14px;
            padding: 16px;
            display: none;
            border: 2px solid #a5d6a7;
            background: #e8f5e9;
        }

        .hasil-box.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .hasil-box.error {
            border-color: #fcc;
            background: #fff5f5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hasil-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .hasil-section {
            margin-bottom: 16px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .hasil-section:last-child {
            margin-bottom: 0;
        }

        .hasil-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hasil-section-header .icon {
            font-size: 16px;
        }

        .hasil-section-header .count {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.7;
            margin-left: auto;
        }

        .header-profesi {
            background: #e8f5e9;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .header-kbli {
            background: #e3f2fd;
            color: var(--secondary);
            border-bottom: 2px solid var(--secondary);
        }

        .header-ai {
            background: #f3e5f5;
            color: #7b1fa2;
            border-bottom: 2px solid #7b1fa2;
        }

        .hasil-item {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .hasil-item:last-child {
            border-bottom: none;
        }
        .hasil-item:hover {
            background: #f8f9fa;
        }

        .hasil-item .header {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .hasil-item .kode {
            font-weight: 700;
            font-size: 15px;
        }

        .kode-profesi {
            color: var(--primary);
        }

        .kode-kbli {
            color: var(--secondary);
        }

        .hasil-item .nama {
            font-weight: 600;
            font-size: 15px;
            flex: 1;
        }

        .hasil-item .arrow {
            font-size: 12px;
            margin-left: auto;
            color: var(--text-light);
        }

        .hasil-item .badge-pilihan {
            font-size: 10px;
            background: var(--primary);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .hasil-item .badge-ai-label {
            font-size: 10px;
            background: #7b1fa2;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .hasil-item .detail {
            display: none;
            margin-top: 10px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-left: 3px solid var(--primary);
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
        }

        .hasil-item .detail-kbli {
            border-left-color: var(--secondary);
        }

        .hasil-item .detail.show {
            display: block;
        }

        .hasil-lainnya {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 14px;
        }

        .hasil-lainnya .label {
            font-weight: 600;
            color: var(--text-light);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hasil-lainnya .item {
            display: inline-block;
            margin: 2px 6px 2px 0;
            cursor: pointer;
            color: var(--secondary);
            text-decoration: underline;
        }

        .hasil-lainnya .item:hover {
            color: var(--secondary-hover);
        }

        .history-box {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 13px;
        }

        .history-box .label {
            font-weight: 600;
            color: var(--text-light);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .query {
            font-weight: 500;
        }
        .history-item .codes {
            color: var(--text-light);
            font-size: 12px;
        }
        .history-item .time {
            color: var(--text-light);
            font-size: 11px;
        }

        .info-ai {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 12px;
            text-align: center;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .loading-text {
            color: var(--text-light);
            font-size: 14px;
            padding: 12px;
            text-align: center;
        }

        .empty-state {
            color: var(--text-light);
            padding: 16px;
            text-align: center;
            font-size: 14px;
        }

        .token-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .token-row input {
            flex: 1;
            min-width: 120px;
        }

        .token-row .btn-ganti {
            background: var(--secondary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }

        .token-row .btn-ganti:hover:not(:disabled) {
            background: var(--secondary-hover);
        }
        .token-row .btn-ganti:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner-dark {
            border: 2px solid var(--text-light);
            border-top-color: transparent;
        }

        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
            }
            .btn-cari {
                width: 100%;
                justify-content: center;
            }
            .card {
                padding: 20px 16px;
            }
            .hasil-item .header {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>🔍 Cari Kode Profesi & KBLI</h1>
            <p class="subtitle">
                Masukkan token, lalu cari pekerjaan atau usaha
                <span class="badge-ai">🤖 AI</span>
            </p>

            <!-- TOKEN -->
            <div class="section-title">🔑 Token</div>
            <div class="form-group">
                <div class="token-row">
                    <input type="password" id="tokenInput" placeholder="Masukkan token..." autocomplete="off">
                    <button class="btn-ganti" id="btnGantiToken">✕ Ganti</button>
                </div>
                <div class="token-status" id="tokenStatus"></div>
            </div>

            <hr class="divider">

            <!-- SEARCH -->
            <div class="section-title">🔍 Cari Pekerjaan / Usaha</div>
            <div class="form-group">
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Contoh: dokter anak, tukang kayu, programmer..." autocomplete="off" disabled>
                    <button class="btn-cari" id="btnCari" disabled>🔍 Cari</button>
                </div>
            </div>

            <!-- HASIL -->
            <div class="hasil-box" id="hasilBox">
                <div class="hasil-label" id="hasilLabel">Hasil Pencarian</div>
                <div id="hasilContent"></div>
                <div class="info-ai" id="infoAi"></div>
            </div>

            <!-- HISTORY -->
            <div class="history-box" id="historyBox">
                <div class="label">📜 Riwayat Pencarian</div>
                <div id="historyContent">
                    <div class="empty-state">Belum ada riwayat</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ============================================================
        // FINAL VERSION - profesi.html (DENGAN GROQ AI)
        // ============================================================

        const VALID_TOKENS = ['lena004', 'lina004', 'hera004', 'salman004', 'nina004', 'uher007', 'ehat007'];
        let profesiData = [];
        let kbliData = [];
        let profesiIndex = null;
        let kbliIndex = null;
        let isIndexed = false;
        let isSearching = false;

        const tokenInput = document.getElementById('tokenInput');
        const tokenStatus = document.getElementById('tokenStatus');
        const btnGantiToken = document.getElementById('btnGantiToken');
        const searchInput = document.getElementById('searchInput');
        const btnCari = document.getElementById('btnCari');
        const hasilBox = document.getElementById('hasilBox');
        const hasilLabel = document.getElementById('hasilLabel');
        const hasilContent = document.getElementById('hasilContent');
        const infoAi = document.getElementById('infoAi');
        const historyContent = document.getElementById('historyContent');

        // ============================================================
        // LOAD DATA
        // ============================================================

        async function loadData() {
            try {
                tokenStatus.textContent = '⏳ Memuat data...';
                tokenStatus.className = 'token-status info';

                const [profesiRes, kbliRes] = await Promise.all([
                    fetch('profesi.json'),
                    fetch('kbli-2025.json')
                ]);

                if (!profesiRes.ok || !kbliRes.ok) throw new Error('Gagal memuat data');

                profesiData = await profesiRes.json();
                const kbliFull = await kbliRes.json();

                kbliData = kbliFull.map(item => ({
                    kode: item.kode,
                    judul: item.judul,
                    uraian: item.uraian ? item.uraian.substring(0, 200) + '...' : ''
                }));

                tokenStatus.textContent = '⏳ Indexing data...';
                tokenStatus.className = 'token-status info';

                profesiIndex = new MiniSearch({
                    idField: 'nomor',
                    fields: ['profesi', 'uraian'],
                    storeFields: ['nomor', 'profesi', 'uraian'],
                    searchOptions: { fuzzy: 0.15, prefix: true }
                });
                profesiIndex.addAll(profesiData);

                kbliIndex = new MiniSearch({
                    idField: 'kode',
                    fields: ['judul', 'uraian'],
                    storeFields: ['kode', 'judul', 'uraian'],
                    searchOptions: { fuzzy: 0.1, prefix: true }
                });
                kbliIndex.addAll(kbliData);

                isIndexed = true;
                tokenStatus.textContent = `✅ Siap! ${profesiData.length} profesi, ${kbliData.length} KBLI`;
                tokenStatus.className = 'token-status success';
                console.log('✅ Data siap!');
                return true;

            } catch (err) {
                console.error('❌ Error:', err);
                tokenStatus.textContent = '⚠️ Error: ' + err.message;
                tokenStatus.className = 'token-status error';
                return false;
            }
        }

        // ============================================================
        // TOKEN & RATE LIMIT
        // ============================================================

        function isValidToken(token) {
            return VALID_TOKENS.includes(token.trim().toLowerCase());
        }

        function getRateLimit(token) {
            const key = 'rateLimit_' + token;
            const data = localStorage.getItem(key);
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    if (Date.now() > parsed.resetAt) {
                        const newData = { count: 0, resetAt: Date.now() + 10 * 60 * 1000 };
                        localStorage.setItem(key, JSON.stringify(newData));
                        return newData;
                    }
                    return parsed;
                } catch (e) {
                    const newData = { count: 0, resetAt: Date.now() + 10 * 60 * 1000 };
                    localStorage.setItem(key, JSON.stringify(newData));
                    return newData;
                }
            }
            const newData = { count: 0, resetAt: Date.now() + 10 * 60 * 1000 };
            localStorage.setItem(key, JSON.stringify(newData));
            return newData;
        }

        function incrementRateLimit(token) {
            const key = 'rateLimit_' + token;
            const data = getRateLimit(token);
            data.count++;
            localStorage.setItem(key, JSON.stringify(data));
            return data;
        }

        function getRemainingText(token) {
            const data = getRateLimit(token);
            const left = Math.max(0, 5 - (data.count || 0));
            const resetIn = Math.ceil((data.resetAt - Date.now()) / 60000);
            const resetText = resetIn > 0 ? `(reset ${resetIn} menit)` : '(reset sekarang)';
            return `${left}/5 ${resetText}`;
        }

        function canSearch(token) {
            const data = getRateLimit(token);
            return (data.count || 0) < 5;
        }

        function updateTokenStatus(token) {
            if (!token) {
                tokenStatus.textContent = '';
                tokenStatus.className = 'token-status';
                return;
            }
            if (!isValidToken(token)) {
                tokenStatus.textContent = '⚠️ Periksa kembali token anda';
                tokenStatus.className = 'token-status error';
                return;
            }
            const remaining = getRemainingText(token);
            const can = canSearch(token);
            if (can) {
                tokenStatus.textContent = `✅ Token valid • 💡 sisa ${remaining}`;
                tokenStatus.className = 'token-status success';
            } else {
                tokenStatus.textContent = `⛔ Token habis • sisa ${remaining} • ganti token`;
                tokenStatus.className = 'token-status error';
            }
        }

        function enableSearch() {
            searchInput.disabled = false;
            btnCari.disabled = false;
        }

        function disableSearch() {
            searchInput.disabled = true;
            btnCari.disabled = true;
        }

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================

        function getProfesiByCode(code) {
            return profesiData.find(p => p.nomor === code);
        }

        function getKbliByCode(code) {
            return kbliData.find(k => k.kode === code);
        }

        function renderSectionHeader(type, items, isMain, isAI) {
            const isProfesi = type === 'profesi';
            const icon = isProfesi ? '👤' : '📂';
            const label = isProfesi ? 'PROFESI' : 'KBLI (Usaha)';
            const count = items ? items.length : 0;

            let headerClass = isProfesi ? 'header-profesi' : 'header-kbli';
            if (isAI) headerClass = 'header-ai';

            let badge = '';
            if (isMain) badge = '⭐ Pilihan';
            if (isAI) badge = '🤖 AI Pilih';

            let html = `<div class="hasil-section">`;
            html += `<div class="hasil-section-header ${headerClass}">`;
            html += `<span class="icon">${icon}</span>`;
            html += `${label}`;
            if (badge) {
                html += ` <span style="font-size:10px;background:#7b1fa2;color:#fff;padding:1px 8px;border-radius:8px;">${badge}</span>`;
            }
            html += `<span class="count">${count} hasil</span>`;
            html += `</div>`;

            if (items && items.length > 0) {
                items.forEach(item => {
                    const code = isProfesi ? item.nomor : item.kode;
                    const title = isProfesi ? item.profesi : item.judul;
                    const desc = item.uraian || '';
                    const codeClass = isProfesi ? 'kode-profesi' : 'kode-kbli';
                    const detailClass = isProfesi ? '' : 'detail-kbli';

                    html += `
                        <div class="hasil-item" onclick="toggleDetail(this)">
                            <div class="header">
                                <span class="kode ${codeClass}">${code}</span>
                                <span class="nama">${title}</span>
                                <span class="arrow">▼</span>
                            </div>
                            <div class="detail ${detailClass}">${desc || 'Tidak ada uraian'}</div>
                        </div>
                    `;
                });
            } else {
                html += `
                    <div style="padding:12px 16px;color:var(--text-light);font-size:14px;">
                        <span style="opacity:0.5;">—</span> Tidak ada hasil
                    </div>
                `;
            }

            html += `</div>`;
            return html;
        }

        function renderOtherResults(profesiCandidates, kbliCandidates) {
            let html = '<div class="hasil-lainnya">';
            html += '<div class="label">📋 Hasil lainnya (database)</div>';

            if (profesiCandidates && profesiCandidates.length > 0) {
                html += '<div style="margin-top:4px;"><strong>👤 Profesi:</strong> ';
                profesiCandidates.forEach((item, i) => {
                    const data = getProfesiByCode(item.nomor);
                    if (data) {
                        html +=
                            `<span class="item" onclick="showDetail('profesi','${data.nomor}')">${data.nomor} - ${data.profesi}</span>`;
                        if (i < profesiCandidates.length - 1) html += ' | ';
                    }
                });
                html += '</div>';
            }

            if (kbliCandidates && kbliCandidates.length > 0) {
                html += '<div style="margin-top:4px;"><strong>📂 KBLI:</strong> ';
                kbliCandidates.forEach((item, i) => {
                    const data = getKbliByCode(item.kode);
                    if (data) {
                        html +=
                            `<span class="item" onclick="showDetail('kbli','${data.kode}')">${data.kode} - ${data.judul}</span>`;
                        if (i < kbliCandidates.length - 1) html += ' | ';
                    }
                });
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('searchHistory') || '[]');
            if (history.length === 0) {
                historyContent.innerHTML = '<div class="empty-state">Belum ada riwayat</div>';
                return;
            }
            let html = '';
            history.slice(0, 10).forEach(item => {
                const time = new Date(item.timestamp);
                const timeStr = time.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                html += `
                    <div class="history-item">
                        <span class="query">${item.query}</span>
                        <span class="codes">${item.profesi || '000'} | ${item.kbli || '000'}</span>
                        <span class="time">${timeStr}</span>
                    </div>
                `;
            });
            historyContent.innerHTML = html;
        }

        function saveHistory(query, profesiCode, kbliCode) {
            const history = JSON.parse(localStorage.getItem('searchHistory') || '[]');
            history.unshift({
                query: query,
                profesi: profesiCode || '000',
                kbli: kbliCode || '000',
                timestamp: Date.now()
            });
            if (history.length > 50) history.pop();
            localStorage.setItem('searchHistory', JSON.stringify(history));
            renderHistory();
        }

        // ============================================================
        // CALL GROQ API
        // ============================================================

        async function callGroq(keyword, profesiCandidates, kbliCandidates) {
            try {
                const profesiText = profesiCandidates.map(p =>
                    `${p.nomor}. ${p.profesi} - ${p.uraian || ''}`
                ).join('\n');

                const kbliText = kbliCandidates.map(k =>
                    `${k.kode}. ${k.judul}`
                ).join('\n');

                const response = await fetch('/.netlify/functions/cari', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keyword: keyword,
                        profesiCandidates: profesiText,
                        kbliCandidates: kbliText
                    })
                });

                if (!response.ok) {
                    throw new Error('API error: ' + response.status);
                }

                const data = await response.json();
                const result = data.result || '';

                const parts = result.split('|');
                const profesiCode = parts[0]?.trim() || '000';
                const kbliCode = parts[1]?.trim() || '000';

                return {
                    profesi: profesiCode,
                    kbli: kbliCode
                };

            } catch (err) {
                console.error('Groq error:', err);
                return null;
            }
        }

        // ============================================================
        // MAIN SEARCH
        // ============================================================

        async function doSearch() {
            const keyword = searchInput.value.trim();
            if (!keyword) return;
            if (!isIndexed) {
                tokenStatus.textContent = '⏳ Data sedang dimuat...';
                tokenStatus.className = 'token-status info';
                return;
            }

            const token = tokenInput.value.trim();
            if (!isValidToken(token)) {
                tokenStatus.textContent = '⚠️ Token tidak valid';
                tokenStatus.className = 'token-status error';
                return;
            }
            if (!canSearch(token)) {
                tokenStatus.textContent = '⛔ Token habis, silakan ganti token';
                tokenStatus.className = 'token-status error';
                return;
            }
            if (isSearching) return;

            isSearching = true;
            btnCari.disabled = true;
            btnCari.innerHTML = '<span class="spinner"></span> Mencari...';
            hasilBox.classList.remove('show', 'error');
            hasilContent.innerHTML = '<div class="loading-text">🔍 Mencari di database...</div>';
            hasilBox.classList.add('show');
            hasilLabel.textContent = '🔍 Mencari...';
            infoAi.textContent = '';

            try {
                // STEP 1: MiniSearch
                const profesiResults = profesiIndex.search(keyword, { limit: 5 });
                const kbliResults = kbliIndex.search(keyword, { limit: 5 });

                let selectedProfesi = null;
                let selectedKbli = null;
                let usedAI = false;

                // STEP 2: Cek apakah perlu AI
                const needAI = profesiResults.length === 0 ||
                    profesiResults[0]?.score < 0.8 ||
                    kbliResults.length === 0 ||
                    kbliResults[0]?.score < 0.8;

                if (needAI && (profesiResults.length > 0 || kbliResults.length > 0)) {
                    // STEP 3: Kirim ke Groq
                    hasilContent.innerHTML = '<div class="loading-text">⏳ AI sedang memilih yang terbaik...</div>';
                    hasilLabel.textContent = '⏳ Menghubungi AI...';

                    const groqResult = await callGroq(keyword, profesiResults, kbliResults);

                    if (groqResult && groqResult.profesi) {
                        selectedProfesi = getProfesiByCode(groqResult.profesi);
                        usedAI = true;
                    }
                    if (groqResult && groqResult.kbli) {
                        selectedKbli = getKbliByCode(groqResult.kbli);
                        usedAI = true;
                    }
                }

                // STEP 4: Fallback ke MiniSearch
                if (!selectedProfesi && profesiResults.length > 0) {
                    selectedProfesi = getProfesiByCode(profesiResults[0].nomor);
                }
                if (!selectedKbli && kbliResults.length > 0) {
                    selectedKbli = getKbliByCode(kbliResults[0].kode);
                }

                // STEP 5: Jika tidak ada hasil sama sekali
                if (!selectedProfesi && !selectedKbli) {
                    hasilContent.innerHTML = `
                        <div class="empty-state">
                            😕 Tidak ada hasil untuk "<strong>${keyword}</strong>"<br>
                            <span style="font-size:13px;color:var(--text-light);">Coba kata kunci lain</span>
                        </div>
                    `;
                    hasilLabel.textContent = 'Tidak ditemukan';
                    hasilBox.classList.add('error');
                    return;
                }

                // STEP 6: Tampilkan hasil
                let html = '';

                // === SECTION PROFESI ===
                let profesiItems = selectedProfesi ? [selectedProfesi] : [];
                html += renderSectionHeader('profesi', profesiItems, true, usedAI);

                // === SECTION KBLI ===
                let kbliItems = selectedKbli ? [selectedKbli] : [];
                html += renderSectionHeader('kbli', kbliItems, true, usedAI);

                // === HASIL LAINNYA ===
                const otherProfesi = profesiResults
                    .filter(p => p.nomor !== selectedProfesi?.nomor)
                    .slice(0, 3)
                    .map(p => getProfesiByCode(p.nomor))
                    .filter(Boolean);

                const otherKbli = kbliResults
                    .filter(k => k.kode !== selectedKbli?.kode)
                    .slice(0, 3)
                    .map(k => getKbliByCode(k.kode))
                    .filter(Boolean);

                if (otherProfesi.length > 0 || otherKbli.length > 0) {
                    html += renderOtherResults(otherProfesi, otherKbli);
                }

                // === INFO SUMBER ===
                const sourceText = usedAI ?
                    '🤖 AI memilih dari kandidat database' :
                    '⚡ Pencocokan langsung dari database (skor tinggi)';
                infoAi.textContent = sourceText;

                hasilContent.innerHTML = html;
                hasilLabel.textContent = '✅ Hasil Pencarian';
                hasilBox.classList.remove('error');

                // Update rate limit & history
                incrementRateLimit(token);
                updateTokenStatus(token);

                saveHistory(
                    keyword,
                    selectedProfesi?.nomor || '000',
                    selectedKbli?.kode || '000'
                );

            } catch (err) {
                console.error('Search error:', err);
                hasilContent.innerHTML = `
                    <div class="empty-state">⚠️ Error: ${err.message}</div>
                `;
                hasilLabel.textContent = '⚠️ Error';
                hasilBox.classList.add('error');
            } finally {
                isSearching = false;
                btnCari.disabled = false;
                btnCari.textContent = '🔍 Cari';
            }
        }

        // ============================================================
        // UI HELPERS
        // ============================================================

        window.toggleDetail = function(el) {
            const detail = el.querySelector('.detail');
            const arrow = el.querySelector('.arrow');
            if (detail) {
                const isOpen = detail.classList.contains('show');
                detail.classList.toggle('show');
                arrow.textContent = isOpen ? '▼' : '▲';
            }
        };

        window.showDetail = function(type, code) {
            document.querySelectorAll('.hasil-item').forEach(item => {
                const kodeEl = item.querySelector('.kode');
                if (kodeEl && kodeEl.textContent.trim() === code) {
                    const detail = item.querySelector('.detail');
                    const arrow = item.querySelector('.arrow');
                    if (detail && !detail.classList.contains('show')) {
                        detail.classList.add('show');
                        if (arrow) arrow.textContent = '▲';
                    }
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        };

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        tokenInput.addEventListener('input', function() {
            const token = this.value.trim();
            if (!token) {
                tokenStatus.textContent = '';
                tokenStatus.className = 'token-status';
                disableSearch();
                return;
            }
            if (isValidToken(token)) {
                const can = canSearch(token);
                if (can) enableSearch();
                else disableSearch();
                updateTokenStatus(token);
            } else {
                tokenStatus.textContent = '⚠️ Periksa kembali token anda';
                tokenStatus.className = 'token-status error';
                disableSearch();
            }
        });

        btnGantiToken.addEventListener('click', function() {
            tokenInput.value = '';
            tokenInput.focus();
            tokenStatus.textContent = '';
            tokenStatus.className = 'token-status';
            disableSearch();
        });

        btnCari.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch();
            }
        });

        // ============================================================
        // INIT
        // ============================================================

        async function init() {
            const loaded = await loadData();
            if (loaded) {
                disableSearch();
                renderHistory();
                tokenInput.focus();
                console.log('✅ profesi.html siap dengan AI!');
                console.log('💡 Token:', VALID_TOKENS.join(', '));
            }
        }

        setInterval(renderHistory, 30000);
        init();
    </script>

</body>
</html>
