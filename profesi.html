<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Kode Profesi & KBLI</title>
    <style>
        :root {
            --primary: #006e16;
            --primary-hover: #00881c;
            --primary-alpha: rgba(0, 110, 22, 0.12);
            --secondary: #0066cc;
            --secondary-hover: #0052a3;
            --bg: #f5f7f6;
            --card: #ffffff;
            --text: #222;
            --text-light: #666;
            --border: #e2e8e4;
            --radius: 18px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            align-self: flex-start;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
        }

        h1 {
            text-align: center;
            color: var(--text);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .divider {
            border: none;
            border-top: 2px solid var(--border);
            margin: 24px 0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .badge {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-token { background: #fff3cd; color: #856404; }
        .badge-free { background: #d4edda; color: #155724; }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-alpha);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
        }

        .btn-cari {
            padding: 14px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-cari:hover { background: var(--primary-hover); }
        .btn-cari:active { transform: scale(0.98); }
        .btn-cari:disabled { background: #aaa; cursor: not-allowed; }

        .btn-secondary {
            background: var(--secondary);
        }
        .btn-secondary:hover { background: var(--secondary-hover); }

        .hasil-box {
            margin-top: 16px;
            background: #e8f5e9;
            border: 2px solid #a5d6a7;
            border-radius: 14px;
            padding: 16px;
            display: none;
        }

        .hasil-box.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hasil-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .hasil-profesi {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .hasil-kode { font-size: 13px; color: var(--text-light); margin-top: 2px; }

        .error-box { background: #fff5f5; border-color: #fcc; }
        .error-box .hasil-profesi { color: #c62828; font-size: 15px; font-weight: 600; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { color: var(--primary); }

        .petunjuk {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 12px;
            font-size: 13px;
            color: #e65100;
            display: none;
        }
        .petunjuk.show { display: block; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== KBLI Styles ===== */
        .kbli-item {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .kbli-item:hover { background: #f0f8ff; }
        .kbli-item:last-child { border-bottom: none; }
        .kbli-kode {
            font-weight: 700;
            font-size: 16px;
            color: var(--secondary);
        }
        .kbli-judul {
            font-size: 15px;
            font-weight: 600;
            margin: 2px 0;
        }
        .kbli-cuplikan {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 2px;
        }
        .kbli-detail {
            display: none;
            margin-top: 10px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-left: 3px solid var(--secondary);
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
        }
        .arrow {
            font-size: 12px;
            margin-right: 6px;
            display: inline-block;
        }

        @media (max-width: 480px) {
            .input-group { flex-direction: column; }
            .btn-cari { width: 100%; justify-content: center; }
            .card { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🔍 Cari Kode Profesi & KBLI</h1>
        <p class="subtitle">Cari kode profesi (pakai token) atau KBLI (gratis)</p>

        <!-- PROFESI -->
        <div class="section-title">
            👤 Profesi / Pekerjaan
            <span class="badge badge-token">🔒 Token</span>
        </div>

        <div class="form-group">
            <label for="inputProfesi">Nama Pekerjaan</label>
            <div class="input-group">
                <input type="text" id="inputProfesi" placeholder="Contoh: tukang somay, guru..." autocomplete="off">
                <button class="btn-cari" id="btnCariProfesi">Cari</button>
            </div>
        </div>

        <div class="hasil-box" id="hasilBoxProfesi">
            <div class="hasil-label" id="hasilLabelProfesi">Hasil Pencarian</div>
            <div class="hasil-profesi" id="hasilJudulProfesi"></div>
            <div class="hasil-kode" id="hasilKodeProfesi"></div>
        </div>
        <div class="petunjuk" id="petunjukSaranProfesi"></div>

        <hr class="divider">

        <!-- KBLI -->
        <div class="section-title">
            📂 KBLI 2025
            <span class="badge badge-free">🌐 Gratis</span>
        </div>

        <div class="form-group">
            <label for="inputKbli">Cari KBLI</label>
            <div class="input-group">
                <input type="text" id="inputKbli" placeholder="Contoh: pertanian, teknologi..." autocomplete="off">
                <button class="btn-cari btn-secondary" id="btnCariKbli">Cari</button>
            </div>
        </div>

        <div class="hasil-box" id="hasilBoxKbli">
            <div class="hasil-label" id="hasilLabelKbli">📊 Memuat data...</div>
            <div id="hasilListKbli"></div>
        </div>

    </div>
    <a href="index.html" class="back-link">← Kembali ke Halaman Utama</a>
</div>

<script>
    // ============================================================
    // 1. PROFESI (dengan Token)
    // ============================================================
    const VALID_TOKENS = [
        'rajadesahera', 'rajadesalena', 'rajadesalina',
        'rajadesanina', 'rajadesasalman', 'purwarajauher', 'purwarajaehat'
    ];

    function validateToken(token) {
        return VALID_TOKENS.includes(token.trim().toLowerCase());
    }

    const DAFTAR_PROFESI = `000. Tidak Bekerja

116. Penyelenggara Acara (Event Organizer/EO)
119. Perajin Batu

174. Tukang Tebang Kayu
176. Ustaz/Mubalig
182. Wartawan
185. Lainnya (tuliskan: ....................................)
999. Tidak Tahu`;

    async function cariProfesi() {
        const keyword = document.getElementById('inputProfesi').value.trim();
        const btn = document.getElementById('btnCariProfesi');
        const hasilBox = document.getElementById('hasilBoxProfesi');
        const hasilLabel = document.getElementById('hasilLabelProfesi');
        const hasilJudul = document.getElementById('hasilJudulProfesi');
        const hasilKode = document.getElementById('hasilKodeProfesi');
        const petunjuk = document.getElementById('petunjukSaranProfesi');

        // Validasi token
        const token = sessionStorage.getItem('tokenProfesi');
        if (!token || !validateToken(token)) {
            const userToken = prompt('Masukkan token untuk pencarian profesi:');
            if (userToken && validateToken(userToken)) {
                sessionStorage.setItem('tokenProfesi', userToken);
            } else {
                alert('Token tidak valid!');
                return;
            }
        }

        if (!keyword) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Mencari...';
        hasilBox.classList.remove('show', 'error-box');
        petunjuk.classList.remove('show');

        try {
            const response = await fetch('/.netlify/functions/cari-profesi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keyword: keyword })
            });

            const data = await response.json();
            const jawaban = data.choices[0].message.content.trim();

            if (jawaban.includes('185') && jawaban.includes('saran:')) {
                const parts = jawaban.split('(saran:');
                hasilJudul.textContent = parts[0].trim();
                hasilKode.textContent = '';
                petunjuk.textContent = '💡 Saran: ' + parts[1].replace(')', '').trim();
                petunjuk.classList.add('show');
            } else {
                hasilJudul.textContent = jawaban;
                hasilKode.textContent = '✅ Pencocokan AI';
            }

            hasilLabel.textContent = 'Hasil Pencarian Profesi';
            hasilBox.classList.add('show');

        } catch (err) {
            hasilLabel.textContent = '⚠️ Error';
            hasilJudul.textContent = 'Gagal menghubungi server';
            hasilKode.textContent = 'Periksa koneksi internet';
            hasilBox.classList.add('error-box', 'show');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Cari';
        }
    }

    // ============================================================
    // 2. KBLI (MANUAL SEARCH - Tanpa Library)
    // ============================================================
    let dataKbli = [];
    let dataLoaded = false;
    let aktifElement = null;

    // Elemen DOM KBLI
    const inputKbli = document.getElementById('inputKbli');
    const btnKbli = document.getElementById('btnCariKbli');
    const hasilBoxKbli = document.getElementById('hasilBoxKbli');
    const hasilLabelKbli = document.getElementById('hasilLabelKbli');
    const hasilListKbli = document.getElementById('hasilListKbli');

    // Load data dari file JSON
    fetch('kbli-2025.json')
        .then(res => {
            if (!res.ok) throw new Error('File kbli-2025.json tidak ditemukan (HTTP ' + res.status + ')');
            return res.json();
        })
        .then(data => {
            dataKbli = data;
            dataLoaded = true;
            console.log('✅ Data KBLI loaded:', dataKbli.length);
            hasilLabelKbli.textContent = '📊 ' + dataKbli.length + ' data KBLI siap';
        })
        .catch(err => {
            console.error('❌ Gagal load KBLI:', err);
            hasilLabelKbli.textContent = '⚠️ ' + err.message;
            hasilLabelKbli.style.color = '#c62828';
        });

    // Fungsi pencarian KBLI
    function cariKbli() {
        const keyword = inputKbli.value.trim();
        console.log('🔍 cariKbli() dipanggil, keyword:', keyword);

        if (!keyword) {
            hasilLabelKbli.textContent = '⚠️ Masukkan kata kunci';
            return;
        }

        if (!dataLoaded || dataKbli.length === 0) {
            hasilLabelKbli.textContent = '⏳ Data KBLI belum siap, tunggu sebentar...';
            return;
        }

        btnKbli.disabled = true;
        btnKbli.innerHTML = '<span class="spinner"></span> Mencari...';
        hasilBoxKbli.classList.remove('show', 'error-box');
        hasilListKbli.innerHTML = '';
        aktifElement = null;

        try {
            // Pecah keyword menjadi kata-kata
            const kataKunci = keyword.toLowerCase().split(' ');
            let hasil = [];

            // Cari data yang mengandung SEMUA kata di judul atau uraian
            hasil = dataKbli.filter(item => {
                const teks = (item.judul + ' ' + item.uraian).toLowerCase();
                return kataKunci.every(kata => teks.includes(kata));
            });

            // Jika tidak ada hasil, coba cari dengan OR (salah satu kata)
            if (hasil.length === 0) {
                console.log('Fallback: mencari dengan OR...');
                hasil = dataKbli.filter(item => {
                    const teks = (item.judul + ' ' + item.uraian).toLowerCase();
                    return kataKunci.some(kata => teks.includes(kata));
                });
            }

            // Tampilkan hasil (maks 5)
            if (hasil.length > 0) {
                const limit = Math.min(hasil.length, 5);
                hasilLabelKbli.textContent = 'Hasil KBLI (' + limit + ' dari ' + hasil.length + ' ditemukan)';
                let html = '';
                for (let i = 0; i < limit; i++) {
                    const item = hasil[i];
                    const cuplikan = item.uraian ? item.uraian.substring(0, 120) + '...' : '';
                    html += `
                        <div class="kbli-item" onclick="toggleDetailKbli(this)">
                            <div>
                                <span class="arrow">▶</span>
                                <span class="kbli-kode">${item.kode}</span>
                                <span class="kbli-judul">${item.judul}</span>
                            </div>
                            <div class="kbli-cuplikan">${cuplikan}</div>
                            <div class="kbli-detail">${item.uraian || 'Tidak ada uraian'}</div>
                        </div>
                    `;
                }
                hasilListKbli.innerHTML = html;
                hasilBoxKbli.classList.add('show');
            } else {
                hasilLabelKbli.textContent = 'Tidak ditemukan';
                hasilListKbli.innerHTML = '<div style="color:var(--text-light);padding:12px;">Tidak ada hasil untuk "<strong>' + keyword + '</strong>"</div>';
                hasilBoxKbli.classList.add('show');
            }

        } catch (err) {
            console.error('Error KBLI:', err);
            hasilLabelKbli.textContent = '⚠️ Error';
            hasilListKbli.innerHTML = '<div style="color:#c62828;">Terjadi kesalahan: ' + err.message + '</div>';
            hasilBoxKbli.classList.add('error-box', 'show');
        } finally {
            btnKbli.disabled = false;
            btnKbli.textContent = 'Cari';
        }
    }

    // Fungsi toggle detail accordion
    window.toggleDetailKbli = function(clickedElement) {
        const detail = clickedElement.querySelector('.kbli-detail');
        const arrow = clickedElement.querySelector('.arrow');

        if (aktifElement === clickedElement) {
            detail.style.display = 'none';
            arrow.textContent = '▶';
            aktifElement = null;
            return;
        }

        if (aktifElement) {
            const oldDetail = aktifElement.querySelector('.kbli-detail');
            const oldArrow = aktifElement.querySelector('.arrow');
            oldDetail.style.display = 'none';
            oldArrow.textContent = '▶';
        }

        detail.style.display = 'block';
        arrow.textContent = '▼';
        aktifElement = clickedElement;
    };

    // Event listener untuk KBLI
    btnKbli.addEventListener('click', cariKbli);
    inputKbli.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') cariKbli();
    });

    // Event listener untuk profesi
    document.getElementById('inputProfesi').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') cariProfesi();
    });
    document.getElementById('btnCariProfesi').addEventListener('click', cariProfesi);

    // Cek token di awal
    const savedToken = sessionStorage.getItem('tokenProfesi');
    if (savedToken && validateToken(savedToken)) {
        // Token valid, tidak perlu prompt
    }

    console.log('✅ profesi.html siap digunakan');
</script>

</body>
</html>
