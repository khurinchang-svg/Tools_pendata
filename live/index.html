<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Monitoring Progress Pendataan SE UMKM Rajadesa & Purwaraja">
    <meta name="theme-color" content="#1565c0">
    <title>Progress SE UMKM Rajadesa</title>
    <link rel="stylesheet" href="../css/live.css">
</head>
<body>

    <div class="card" role="main" aria-label="Dashboard Progress Pendataan">

        <header class="header">
            <h1>SENGSUS</h1>
            <p class="subtitle">TIM GEBER</p>
            <p class="subtitle">RAJADESA &mdash; PURWARAJA</p>
        </header>

        <!-- Nasional + Lokal -->
        <section class="persen-box" aria-label="Progress Nasional dan Lokal">
            <div class="persen-item">
                <div class="judul">Nasional</div>
                <div id="nasional" class="percent">0%</div>
            </div>
            <div class="persen-item">
                <div class="judul">Lokal</div>
                <div id="percent" class="percent">0%</div>
            </div>
        </section>

        <!-- Progress Bar -->
        <div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progress pendataan lokal">
            <div id="bar" class="bar" style="width:0%"></div>
        </div>

        <!-- Statistik -->
        <div class="row"><span>Target</span><b id="target">0</b></div>
        <div class="row"><span>Terdata</span><b id="done">0</b></div>
        <div class="row"><span>Sisa</span><b id="remain">0</b></div>
        <div class="row"><span>Petugas</span><b id="officer">0</b></div>

        <!-- Update time -->
        <div class="update" id="update" aria-live="polite">Belum diperbarui</div>

        <!-- Daftar Petugas -->
        <h3>Progress Petugas</h3>
        <div id="petugasList" aria-label="Daftar progress petugas"></div>

        <!-- Tombol Refresh -->
        <button id="refresh" aria-label="Refresh data">🔄 Refresh</button>

<a href="../index.html" class="back-btn">
    ← Kembali ke Dashboard
</a>

        <!-- Status -->
        <div id="status" role="status" aria-live="assertive"></div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
